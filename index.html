<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Random Phone Builds</title>
<link rel="icon" href="/randomphonebuilds/favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #C42020;
    --bg: #FAFAFA;
    --card-bg: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #6E6E73;
    --divider: #E5E5E7;
    --hover-bg: rgba(0, 0, 0, 0.02);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .top-bar {
    height: 3px;
    background: var(--accent);
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: clamp(3rem, 8vw, 7rem) clamp(1.5rem, 4vw, 2rem) 4rem;
  }

  /* Header */
  header {
    margin-bottom: 3.5rem;
    animation: fadeInUp 0.6s ease-out both;
  }

  header .label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 1rem;
  }

  h1 {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 0.75rem;
    color: var(--text-primary);
  }

  header .subtitle {
    font-size: 1.05rem;
    color: var(--text-secondary);
    font-weight: 300;
    line-height: 1.6;
  }

  /* Count badge */
  .count {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-secondary);
    background: var(--card-bg);
    border: 1px solid var(--divider);
    border-radius: 100px;
    padding: 0.3rem 0.9rem;
    letter-spacing: 0.02em;
  }

  /* Project list */
  .projects {
    list-style: none;
  }

  .projects li {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeInUp 0.45s ease-out forwards;
  }

  .projects li + li {
    border-top: 1px solid var(--divider);
  }

  .projects a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.2rem 0.75rem;
    margin: 0 -0.75rem;
    text-decoration: none;
    color: var(--text-primary);
    border-radius: 12px;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .projects a:hover {
    background: var(--hover-bg);
  }

  .projects a:hover .title {
    color: var(--accent);
  }

  .projects .info {
    flex: 1;
    min-width: 0;
  }

  .projects .title {
    display: block;
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: -0.01em;
    transition: color 0.2s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .projects .desc {
    display: block;
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 300;
    margin-top: 0.2rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .projects .date {
    flex-shrink: 0;
    font-size: 0.72rem;
    color: var(--text-secondary);
    font-weight: 400;
    letter-spacing: 0.02em;
    white-space: nowrap;
    margin-right: 4px;
  }

  .projects .arrow {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--divider);
    transition: color 0.2s ease, transform 0.2s ease;
  }

  .projects a:hover .arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* Loading & empty states */
  .state-msg {
    padding: 4rem 0;
    text-align: center;
    color: var(--text-secondary);
    font-weight: 300;
    font-size: 0.95rem;
  }

  .loader {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid var(--divider);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  /* Footer */
  footer {
    margin-top: 5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--divider);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  footer span,
  footer a {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  footer a {
    text-decoration: none;
    transition: color 0.2s ease;
  }

  footer a:hover {
    color: var(--accent);
  }

  /* Animations */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Mobile */
  @media (max-width: 500px) {
    .projects a {
      padding: 1rem 0.5rem;
      margin: 0 -0.5rem;
    }
    .projects .desc {
      white-space: normal;
    }
  }

  /* Password gate */
  #gate {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
  }
  #gate.hidden { display: none; }
  #gate h2 {
    font-size: 1.5rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  #gate form {
    display: flex;
    gap: 0.5rem;
  }
  #gate input[type="password"] {
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.6rem 1rem;
    border: 1px solid var(--divider);
    border-radius: 8px;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }
  #gate input[type="password"]:focus {
    border-color: var(--accent);
  }
  #gate button {
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    padding: 0.6rem 1.25rem;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #gate button:hover { opacity: 0.85; }
  #gate .error {
    font-size: 0.8rem;
    color: var(--accent);
    min-height: 1.2em;
  }
  #main-content.locked { display: none; }
</style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <h2>Private</h2>
  <form id="gate-form">
    <input type="password" id="gate-pw" placeholder="Password" autocomplete="off" autofocus>
    <button type="submit">Enter</button>
  </form>
  <p class="error" id="gate-error"></p>
</div>

<div id="main-content" class="locked">
<div class="top-bar"></div>

<div class="container">
  <header>
    <p class="label">Zach Ramsey</p>
    <h1>Random Phone Builds</h1>
    <p class="subtitle">Research docs, HTML articles, and random builds &mdash; a place to park pages and share them.</p>
    <span class="count" id="count"></span>
  </header>

  <ul class="projects" id="projects">
    <li class="state-msg" id="loading"><span class="loader"></span> Loading projects&hellip;</li>
  </ul>

  <footer>
    <span>&copy; 2026</span>
    <a href="https://github.com/ratfacedgranny/randomphonebuilds">Source on GitHub</a>
  </footer>
</div>

<script>
// Password gate
(function() {
  var HASH = 'a5ac1f967df633ef08906d2d95b022c36aad8a61d7256edb7b2b294c8407d8a5';
  var KEY = 'rpb_auth';
  var gate = document.getElementById('gate');
  var main = document.getElementById('main-content');

  async function sha256(str) {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  function unlock() {
    gate.classList.add('hidden');
    main.classList.remove('locked');
    localStorage.setItem(KEY, '1');
  }

  // Check if already authenticated
  if (localStorage.getItem(KEY) === '1') {
    unlock();
  }

  document.getElementById('gate-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    var pw = document.getElementById('gate-pw').value;
    var h = await sha256(pw);
    if (h === HASH) {
      unlock();
    } else {
      document.getElementById('gate-error').textContent = 'Wrong password';
      document.getElementById('gate-pw').value = '';
      document.getElementById('gate-pw').focus();
    }
  });
})();

(async function () {
  const REPO = 'ratfacedgranny/randomphonebuilds';
  const API  = 'https://api.github.com/repos/' + REPO + '/contents/';
  const SKIP = new Set(['index.html', 'CLAUDE.md', 'README.md', 'LICENSE', '.gitignore', 'CNAME']);

  const listEl  = document.getElementById('projects');
  const countEl = document.getElementById('count');

  // Pretty-print folder names: underscores/hyphens → spaces, title case
  function prettify(name) {
    return name
      .replace(/[-_]+/g, ' ')
      .replace(/\b\w/g, function (c) { return c.toUpperCase(); });
  }

  // Fetch the <title> and <meta name="published"> from a project's index.html
  async function fetchMeta(folder) {
    try {
      var res = await fetch('/' + REPO.split('/')[1] + '/' + folder + '/index.html');
      if (!res.ok) return { title: null, published: null };
      var html = await res.text();
      var tm = html.match(/<title[^>]*>(.*?)<\/title>/i);
      var pm = html.match(/<meta\s+name=["']published["']\s+content=["']([^"']+)["']/i);
      return {
        title: tm ? tm[1].trim() : null,
        published: pm ? pm[1].trim() : null
      };
    } catch (e) {
      return { title: null, published: null };
    }
  }

  try {
    var res = await fetch(API);
    if (!res.ok) throw new Error('GitHub API returned ' + res.status);
    var items = await res.json();

    // Filter to directories only, skip known root files
    var folders = items.filter(function (item) {
      return item.type === 'dir' && !SKIP.has(item.name) && !item.name.startsWith('.');
    });

    if (folders.length === 0) {
      listEl.innerHTML = '<li class="state-msg">No projects yet.</li>';
      countEl.textContent = '0 projects';
      return;
    }

    countEl.textContent = folders.length + (folders.length === 1 ? ' project' : ' projects');

    // Fetch title + published date from each project's index.html
    var metas = await Promise.all(folders.map(function (f) { return fetchMeta(f.name); }));

    // Build combined array and sort by published date (newest first)
    var projects = folders.map(function (folder, i) {
      return { folder: folder, title: metas[i].title, date: metas[i].published };
    });
    projects.sort(function (a, b) {
      if (!a.date && !b.date) return 0;
      if (!a.date) return 1;
      if (!b.date) return -1;
      return new Date(b.date) - new Date(a.date);
    });

    listEl.innerHTML = '';

    projects.forEach(function (proj, i) {
      var li = document.createElement('li');
      li.style.animationDelay = (0.08 + i * 0.05) + 's';
      var displayName = prettify(proj.folder.name);
      var dateStr = '';
      if (proj.date) {
        var d = new Date(proj.date + 'T00:00:00');
        dateStr = '<span class="date">' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) + '</span>';
      }
      li.innerHTML =
        '<a href="' + proj.folder.name + '/">' +
          '<span class="info">' +
            '<span class="title">' + displayName + '</span>' +
            (proj.title ? '<span class="desc">' + proj.title + '</span>' : '') +
          '</span>' +
          dateStr +
          '<svg class="arrow" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M7 4l6 6-6 6"/>' +
          '</svg>' +
        '</a>';
      listEl.appendChild(li);
    });
  } catch (e) {
    // Fallback: if API fails (rate limit, etc.), show a static link
    listEl.innerHTML =
      '<li class="state-msg">Couldn\'t load projects automatically.<br>' +
      '<a href="https://github.com/ratfacedgranny/randomphonebuilds" style="color:var(--accent)">Browse on GitHub</a></li>';
    console.error('Directory fetch failed:', e);
  }
})();
</script>

</div><!-- /main-content -->
</body>
</html>
